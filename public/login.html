<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budget Allocator — Acceso</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1a2a3a 0%, #0f1a24 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .login-container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      width: 450px;
      max-width: 90%;
      padding: 32px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 8px;
      color: #1a2a3a;
      text-align: center;
    }
    .sub {
      text-align: center;
      font-size: 12px;
      color: #666;
      margin-bottom: 24px;
    }
    .tabs {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      border-bottom: 1px solid #ddd;
    }
    .tab-btn {
      background: none;
      border: none;
      padding: 8px 0;
      font-size: 16px;
      cursor: pointer;
      color: #666;
      font-weight: bold;
      transition: 0.2s;
      flex: 1;
    }
    .tab-btn.active {
      color: #1a6eb5;
      border-bottom: 2px solid #1a6eb5;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 4px;
      color: #333;
    }
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    input:focus {
      outline: none;
      border-color: #1a6eb5;
    }
    .error-msg {
      color: #c0392b;
      font-size: 12px;
      margin-bottom: 12px;
      text-align: center;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #1a6eb5;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }
    button:hover {
      background: #155a99;
    }
    .hidden {
      display: none;
    }
    hr {
      margin: 20px 0;
      border: none;
      border-top: 1px solid #eee;
    }
  </style>
</head>
<body>
<div class="login-container">
  <h1>Budget Allocator</h1>
  <div class="sub">Planeador de Inversión Publicitaria</div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-login">Iniciar sesión</button>
    <button class="tab-btn" id="tab-register">Crear cuenta</button>
  </div>

  <div id="login-form">
    <div class="form-group">
      <label>Usuario</label>
      <input type="text" id="login-username" placeholder="Nombre de usuario" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="login-password" placeholder="Contraseña" autocomplete="current-password">
    </div>
    <div id="login-error" class="error-msg"></div>
    <button id="login-btn">Entrar</button>
  </div>

  <div id="register-form" class="hidden">
    <div class="form-group">
      <label>Usuario</label>
      <input type="text" id="reg-username" placeholder="Nombre de usuario (único)">
    </div>
    <div class="form-group">
      <label>Nombre</label>
      <input type="text" id="reg-name" placeholder="Nombre completo">
    </div>
    <div class="form-group">
      <label>Apellido (opcional)</label>
      <input type="text" id="reg-lastname" placeholder="Apellido">
    </div>
    <div class="form-group">
      <label>Edad (opcional)</label>
      <input type="number" id="reg-age" placeholder="Edad">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="reg-password" placeholder="Contraseña">
    </div>
    <div class="form-group">
      <label>Confirmar contraseña</label>
      <input type="password" id="reg-confirm" placeholder="Repite la contraseña">
    </div>
    <div id="register-error" class="error-msg"></div>
    <button id="register-btn">Registrarse</button>
  </div>
</div>

<script src="/js/login.js"></script>
</body>
</html>
